name: Debug Compile v17

on: workflow_dispatch

permissions:
  contents: write

jobs:
  debug:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Compile v17
        run: |
          cd ByPass
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          echo "SDK=$SDK"
          ls -la TrollRecorderBypass_v17.m
          
          {
            clang -v -arch arm64 -dynamiclib               -framework Foundation -framework Security -framework CoreFoundation               -isysroot "$SDK"               -miphoneos-version-min=14.0               -fobjc-arc               -o /tmp/test_v17.dylib               TrollRecorderBypass_v17.m 2>&1
          } || true
          
          echo "---EXIT_CODE=$?---"

      - name: Save log
        if: always()
        run: |
          cp ByPass/TrollRecorderBypass_v17.m debug_v17_source.m 2>/dev/null || true
          echo "Saved source for inspection"
