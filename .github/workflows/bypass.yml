name: Build TrollRecorder ByPass (Binary Patch)

on:
  push:
    paths:
      - 'ByPass/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Bypass (v15 Full Auto-Swizzle)
        working-directory: ByPass
        run: bash build.sh
        env:
          SKIP_PATCH: 1

      - name: Upload TRApp_ByPass.tipa
        uses: actions/upload-artifact@v4
        with:
          name: TRApp_ByPass.tipa
          path: ByPass/TRApp_ByPass.tipa
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "ByPass/TRApp_ByPass.tipa"
          tag: v16-${{ github.run_number }}
          name: "v16 Build #${{ github.run_number }}"
          body: "TrollRecorder Bypass v16 (fishhook + swizzle) - CI Build #${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false