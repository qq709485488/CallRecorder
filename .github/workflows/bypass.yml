name: Build TrollRecorder ByPass (Binary Patch)

on:
  push:
    paths:
      - 'ByPass/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Bypass (v18 Strong-Link + Binary Patch)
        working-directory: ByPass
        run: bash build.sh
        env:
          SKIP_PATCH: 1

      - name: Upload TRApp_ByPass.tipa
        uses: actions/upload-artifact@v4
        with:
          name: TRApp_ByPass.tipa
          path: ByPass/TRApp_ByPass.tipa
      
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "ByPass/TRApp_ByPass.tipa"
          tag: v18-${{ github.run_number }}
          name: "v18 Build #${{ github.run_number }}"
          body: "TrollRecorder Bypass v18 (strong-link dylib + binary patch) - CI Build #${{ github.run_number }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false