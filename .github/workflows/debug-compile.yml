name: Debug Compile v16
on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Compile (capture output)
        working-directory: ByPass
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK" > /tmp/build.log
          echo "Source: $(pwd)/TrollRecorderBypass_v16.m" >> /tmp/build.log
          echo "" >> /tmp/build.log
          clang -arch arm64 -dynamiclib             -framework Foundation             -framework Security             -isysroot "$SDK"             -miphoneos-version-min=14.0             -fobjc-arc             -v             -o /tmp/test.dylib             TrollRecorderBypass_v16.m >> /tmp/build.log 2>&1
          echo "" >> /tmp/build.log
          echo "EXIT_CODE=$?" >> /tmp/build.log
      
      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
