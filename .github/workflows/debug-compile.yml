name: Debug Compile v16
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Compile and commit log
        working-directory: ByPass
        run: |
          set +e
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          LOG="../build_log.txt"
          echo "SDK=$SDK" > $LOG
          echo "PWD=$(pwd)" >> $LOG
          echo "FILE=$(ls -la TrollRecorderBypass_v16.m 2>&1)" >> $LOG
          echo "" >> $LOG
          clang -arch arm64 -dynamiclib             -framework Foundation             -framework Security             -isysroot "$SDK"             -miphoneos-version-min=14.0             -fobjc-arc             -v             -o /tmp/test.dylib             TrollRecorderBypass_v16.m >> $LOG 2>&1
          echo "" >> $LOG
          echo "EXIT_CODE=$?" >> $LOG
          echo "Build log size: $(wc -c < $LOG) bytes"
          
          # Commit and push log
          git config user.name "CI Bot"
          git config user.email "ci@bot.com"
          git add $LOG
          git commit -m "CI: build log" || true
          git push
