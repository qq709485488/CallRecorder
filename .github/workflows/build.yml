name: Build CallRecorder Clean

on:
  push:
    paths:
      - '**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          echo "=== pbxproj content (first 200 lines) ==="
          head -200 CallRecorder.xcodeproj/project.pbxproj
          echo "=== grep for Swift files ==="
          grep -c '\.swift' CallRecorder.xcodeproj/project.pbxproj || echo "0"
          echo "=== grep for PBXFileReference ==="
          grep -c 'PBXFileReference' CallRecorder.xcodeproj/project.pbxproj || echo "0"
          echo "=== grep for source file references ==="
          grep 'PBXFileReference' CallRecorder.xcodeproj/project.pbxproj | head -20

      - name: Generate silence.wav
        run: |
          python3 -c "
          import struct, wave, os
          os.makedirs('Resources', exist_ok=True)
          duration = 10
          sample_rate = 44100
          samples = int(duration * sample_rate)
          data = struct.pack('<' + 'h' * samples, *[0] * samples)
          with wave.open('Resources/silence.wav', 'w') as f:
              f.setnchannels(1)
              f.setsampwidth(2)
              f.setframerate(sample_rate)
              f.writeframes(data)
          print('Generated silence.wav')
          "

      - name: Build
        run: |
          set -e
          xcodebuild \
            -project CallRecorder.xcodeproj \
            -scheme CallRecorder \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/build.log | tail -100
          echo "=== Build summary ==="
          echo "CompileSwift count: $(grep -c 'CompileSwift' /tmp/build.log || echo 0)"
          echo "App size:"
          find build/DerivedData/Build/Products/Release-iphoneos -name "*.app" -exec du -sh {} \;

      - name: Verify and Package .tipa
        run: |
          APP=$(find build/DerivedData/Build/Products/Release-iphoneos -name "*.app" -type d | head -1)
          cp -R Resources/silence.wav "$APP/" 2>/dev/null || true
          echo "=== App contents ==="
          ls -la "$APP/"
          echo "=== Binary info ==="
          BINARY=$(find "$APP" -type f -perm +111 -name "CallRecorder" -o -name "TRApp" | head -1)
          if [ -f "$BINARY" ]; then
            file "$BINARY"
            stat -f%z "$BINARY"
          fi
          mkdir -p Payload
          cp -R "$APP" Payload/
          ditto -c -k Payload TRApp-Clean.tipa
          echo "=== .tipa size ==="
          stat -f%z TRApp-Clean.tipa

      - name: Upload .tipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TRApp-Clean.tipa
          path: TRApp-Clean.tipa