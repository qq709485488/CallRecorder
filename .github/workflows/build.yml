# ============================================================
#  CallRecorder 纯净版 GitHub Actions 自动构建
#  无验证代码，全功能模块连通，直接生成 .tipa
# ============================================================

name: Build CallRecorder Clean

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          xcodegen generate
          echo "=== Check Xcode project ==="
          echo "Files in CallRecorder target:"
          grep -o '"[^"]*\.swift"' CallRecorder.xcodeproj/project.pbxproj | sort -u | head -50
          echo "Total Swift files in project: $(grep -c '\.swift"' CallRecorder.xcodeproj/project.pbxproj || echo 0)"

      - name: Generate silence.wav
        run: |
          python3 -c "
          import struct, wave, os
          os.makedirs('Resources', exist_ok=True)
          duration = 10
          sample_rate = 44100
          samples = int(duration * sample_rate)
          data = struct.pack('<' + 'h' * samples, *[0] * samples)
          with wave.open('Resources/silence.wav', 'w') as f:
              f.setnchannels(1)
              f.setsampwidth(2)
              f.setframerate(sample_rate)
              f.writeframes(data)
          print('Generated silence.wav')
          "

      - name: Build
        run: |
          set -e
          echo "=== Source files found ==="
          find App Sources UI PlugIns -name "*.swift" | sort
          echo ""
          echo "=== Total Swift files: $(find App Sources UI PlugIns -name '*.swift' | wc -l) ==="
          echo ""
          echo "=== Build started ==="
          xcodebuild \
            -project CallRecorder.xcodeproj \
            -scheme CallRecorder \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee /tmp/build.log | tail -80
          echo "=== Build completed ==="
          echo ""
          echo "=== Build summary ==="
          echo "CompileSwift count: $(grep -c 'CompileSwift' /tmp/build.log || echo 0)"
          echo "Ld count: $(grep -c 'Ld ' /tmp/build.log || echo 0)"
          echo "Warnings: $(grep -c 'warning:' /tmp/build.log || echo 0)"
          echo "Errors: $(grep -c 'error:' /tmp/build.log || echo 0)"
          echo ""
          echo "=== All CompileSwift lines ==="
          grep 'CompileSwift' /tmp/build.log | head -50 || echo "None found"
          echo ""
          echo "=== All Ld lines ==="
          grep 'Ld ' /tmp/build.log || echo "None found"

      - name: Verify and Package .tipa
        run: |
          set -e
          APP_PATH=$(find build/DerivedData -name "TRApp.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found!"
            find build/DerivedData -name "*.app" -type d 2>/dev/null || echo "No .app bundles found"
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          # 检查 .app 内容
          echo "=== .app contents ==="
          ls -laR "$APP_PATH/" | head -80
          echo ""
          echo "=== Binary ==="
          if [ -f "$APP_PATH/TRApp" ]; then
            ls -la "$APP_PATH/TRApp"
            file "$APP_PATH/TRApp"
            echo ""
            echo "=== Binary architecture ==="
            lipo -info "$APP_PATH/TRApp" 2>/dev/null || echo "lipo not available"
            echo ""
            echo "=== Binary load commands ==="
            otool -l "$APP_PATH/TRApp" 2>/dev/null | grep -E "(cmd |cmdsize|segname|sectname)" | head -30
            echo ""
            echo "=== Binary symbols grep TR ==="
            nm "$APP_PATH/TRApp" 2>/dev/null | grep -i "TR[A-Z]" | head -30 || echo "No TR symbols found"
            echo ""
            echo "=== ObjC classes ==="
            otool -ov "$APP_PATH/TRApp" 2>/dev/null | grep "Contents of" | head -30 || echo "No ObjC class info"
          else
            echo "ERROR: TRApp binary not found!"
            find "$APP_PATH" -type f -perm +111 | head -10
          fi
          echo "=== PlugIns ==="
          ls -la "$APP_PATH/PlugIns/" 2>/dev/null || echo "No PlugIns"
          
          # 打包为 .tipa
          mkdir -p output/tipa/Payload
          cp -R "$APP_PATH" output/tipa/Payload/
          cd output/tipa
          ditto -c -k --sequesterRsrc --keepParent Payload ../TRApp.tipa
          cd ../..
          
          echo "=== TIPA info ==="
          ls -la output/TRApp.tipa
          echo "TIPA size: $(du -sh output/TRApp.tipa | cut -f1)"

      - name: Upload .tipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TRApp-Clean.tipa
          path: output/TRApp.tipa
          retention-days: 7