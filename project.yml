# ============================================================
#  CallRecorder XcodeGen 项目配置
#  使用方法: xcodegen generate
#  安装 XcodeGen: brew install xcodegen
# ============================================================

name: CallRecorder
options:
  bundleIdPrefix: wiki.qaq.trapp
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  developmentLanguage: zh-Hans

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: wiki.qaq.trapp
    INFOPLIST_FILE: App/Info.plist
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    VALID_ARCHS: arm64
    ARCHS: arm64
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CLANG_ENABLE_MODULES: YES
    SWIFT_OBJC_BRIDGING_HEADER: ""
    PRODUCT_NAME: TRApp
    DISPLAY_NAME: CallRecorder

targets:
  CallRecorder:
    type: application
    platform: iOS
    sources:
      - App
      - Sources
      - UI
      - Resources
    settings:
      base:
        INFOPLIST_FILE: App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: wiki.qaq.trapp
        CODE_SIGN_ENTITLEMENTS: CallRecorder.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - target: LaunchButt
      - target: LaunchPadExtension
    preBuildScripts: []
    postBuildScripts:
      - name: Embed PlugIns
        script: |
          set -e
          PLUGINS_DIR="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/PlugIns"
          mkdir -p "$PLUGINS_DIR"
          if [ -d "$BUILT_PRODUCTS_DIR/LaunchButt.appex" ]; then
            cp -R "$BUILT_PRODUCTS_DIR/LaunchButt.appex" "$PLUGINS_DIR/"
          fi
          if [ -d "$BUILT_PRODUCTS_DIR/LaunchPadExtension.appex" ]; then
            cp -R "$BUILT_PRODUCTS_DIR/LaunchPadExtension.appex" "$PLUGINS_DIR/"
          fi
        inputFiles: []
        outputFiles: []
    attributes:
      SystemCapabilities:
        com.apple.Push:
          enabled: false
        com.apple.BackgroundModes:
          enabled: true
          modes:
            - audio
            - fetch
            - location
            - processing
        com.apple.Keychain:
          enabled: false
        com.apple.iCloud:
          enabled: false
    coreDataModels:
      - path: Resources/CallRecorder.xcdatamodeld
        currentVersion: CallRecorder.xcdatamodel

  LaunchButt:
    type: app-extension
    platform: iOS
    sources:
      - PlugIns/LaunchButt
    settings:
      base:
        INFOPLIST_FILE: PlugIns/LaunchButt/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: wiki.qaq.trapp.LaunchButt
        CODE_SIGN_ENTITLEMENTS: CallRecorder.entitlements
        PRODUCT_NAME: LaunchButt
    dependencies: []

  LaunchPadExtension:
    type: app-extension
    platform: iOS
    sources:
      - PlugIns/LaunchPadExtension
    settings:
      base:
        INFOPLIST_FILE: PlugIns/LaunchPadExtension/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: wiki.qaq.trapp.LaunchPadExtension
        CODE_SIGN_ENTITLEMENTS: CallRecorder.entitlements
        PRODUCT_NAME: LaunchPadExtension
    dependencies: []

schemes:
  CallRecorder:
    build:
      targets:
        CallRecorder: all
        LaunchButt: all
        LaunchPadExtension: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release